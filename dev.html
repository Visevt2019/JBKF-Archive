<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>JBKF Developer Panel</title>
<script src="dev.js" defer></script>

<style>
body{
  font-family:Arial, sans-serif;
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  border:1px solid #ddd;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.hidden{
  display:none;
}

input, textarea, select{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
}

button{
  padding:8px 14px;
  margin-right:6px;
}

.item{
  border:1px solid #eee;
  padding:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}
#errorBox{
  background:#ffe6e6;
  padding:10px;
  margin-bottom:15px;
  display:none;
}
</style>
</head>

<body>

<h1>JBKF Developer Panel</h1>

<div id="errorBox"></div>

<div id="loginCard" class="card">
<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p>This editor updates <b>data.json</b> directly.</p>
</div>


<div id="editorCard" class="card hidden">

<h2>Series</h2>

<select id="seriesSelect"></select>

<button id="addSeries">Add Series</button>
<button id="removeSeries">Remove Series</button>

<h3>Edit Series</h3>

<input id="seriesTitle" placeholder="Title">
<input id="seriesIntro" placeholder="Intro">
<input id="seriesImage" placeholder="Image filename">

<button id="saveSeries">Save Series</button>


<h2>Chapters</h2>

<div id="chaptersList"></div>

<button id="addChapter">Add Chapter</button>


<div id="chapterEditor" class="hidden">

<h3>Edit Chapter</h3>

<input id="chapterTitle" placeholder="Title">
<input id="chapterDate" type="date">
<input id="chapterAuthor" placeholder="Author">

<textarea id="chapterCode" rows="8"></textarea>

<button id="saveChapter">Save Chapter</button>
<button id="cancelChapter">Cancel</button>

</div>

</div>

</body>
</html>
