name: Update Data

on:
  workflow_dispatch:   # allows manual trigger
  push:
    paths:
      - "data.json"    # runs when data.json changes

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Commit updated data.json
        run: |
          git config --global user.name "JBKF Bot"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "Update data.json via developer page"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
